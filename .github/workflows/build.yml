name: Build OpenCV for ESP32

on:
  workflow_dispatch:
    inputs:
      esp_idf_version:
        description: "espressif/idf Docker image tag (see hub.docker.com/r/espressif/idf/tags)."
        required: false
        default: "release-v5.3"

permissions:
  contents: write   # needed to create/update a release in this repo

jobs:
  build-opencv:
    runs-on: ubuntu-latest
    env:
      IDF_VER: ${{ github.event.inputs.esp_idf_version || 'release-v5.3' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout esp32-opencv
        uses: actions/checkout@v6
        with:
          repository: nicklasb/esp32-opencv
          submodules: "recursive"

      - name: Record upstream commit used
        id: upstream
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Write inner build script
        run: |
          cat > inner_build.sh << 'SCRIPT_EOF'
          #!/bin/bash
          set -e

          echo "IDF_PATH=${IDF_PATH:-<unset>}"
          echo "whoami: $(whoami), HOME=$HOME"

          TOOLCHAIN_FILE=""
          for CANDIDATE_ROOT in "$IDF_PATH" "/opt/esp/idf" "$HOME/esp/esp-idf" "/root/esp/esp-idf"; do
            if [ -n "$CANDIDATE_ROOT" ] && [ -d "$CANDIDATE_ROOT" ]; then
              FOUND=$(find "$CANDIDATE_ROOT" -name "toolchain-esp32.cmake" -print -quit 2>/dev/null)
              if [ -n "$FOUND" ]; then
                TOOLCHAIN_FILE="$FOUND"
                break
              fi
            fi
          done

          if [ -z "$TOOLCHAIN_FILE" ]; then
            echo "::error::toolchain-esp32.cmake not found. Searched IDF_PATH, /opt/esp/idf, \$HOME/esp/esp-idf, /root/esp/esp-idf"
            echo "Listing /opt/esp:"
            find /opt/esp -maxdepth 4 -iname "*toolchain*" 2>/dev/null || true
            exit 1
          fi
          echo "Using toolchain file: $TOOLCHAIN_FILE"

          # The upstream script does `cmake ... | tee /dev/tty | grep ...`,
          # which fails in CI (no controlling terminal). Patch it to use
          # /dev/stderr so the cmake summary is still visible in logs
          # while the pipe to grep continues to work.
          sed -i 's#tee /dev/tty#tee /dev/stderr#' esp32/scripts/build_opencv_for_esp32.sh

          # Lightweight heartbeat so the log doesn't look stalled during
          # long compilation steps
          ( while true; do sleep 60; echo "[heartbeat] still building... $(date +%H:%M:%S)"; done ) &
          HEARTBEAT_PID=$!
          trap 'kill $HEARTBEAT_PID 2>/dev/null || true' EXIT

          echo "About to invoke build script with TOOLCHAIN_FILE='${TOOLCHAIN_FILE}'"
          set +e
          printf 'y\n' | bash esp32/scripts/build_opencv_for_esp32.sh "${TOOLCHAIN_FILE}" esp32/lib
          BUILD_STATUS=$?
          set -e

          if [ $BUILD_STATUS -ne 0 ]; then
            ADE_HEADER="build/3rdparty/ade/ade-0.1.1f/sources/ade/include/ade/typed_graph.hpp"
            if [ -f "$ADE_HEADER" ] && ! grep -q '#include <cstdint>' "$ADE_HEADER"; then
              echo "Detected missing <cstdint> in ade typed_graph.hpp (GCC 13 stricter includes). Patching and resuming build."
              sed -i '0,/#include "typed_metadata.hpp"/ s/#include "typed_metadata.hpp"/#include <cstdint>\n#include "typed_metadata.hpp"/' "$ADE_HEADER"

              # Resume the build (configure already done, just re-run make + the
              # install/copy steps the upstream script does after make)
              (
                cd build
                make -j3
              )

              # Re-run install/copy steps by re-invoking the script, which will
              # rm -rf build/ again -- instead, replicate the copy steps here.
              LIB_INSTALL_PATH="esp32/lib"
              mkdir -p "$LIB_INSTALL_PATH/opencv" "$LIB_INSTALL_PATH/opencv/3rdparty" "$LIB_INSTALL_PATH/opencv/opencv2"
              cp build/lib/* "$LIB_INSTALL_PATH/opencv/"
              cp build/3rdparty/lib/* "$LIB_INSTALL_PATH/opencv/3rdparty/"
              cp build/opencv2/* "$LIB_INSTALL_PATH/opencv/opencv2/"
              cp include/opencv2/opencv.hpp "$LIB_INSTALL_PATH/opencv/opencv2/"
              for mod in core imgproc imgcodecs; do
                cp -r "modules/${mod}/include/opencv2" "$LIB_INSTALL_PATH/opencv/"
              done
              echo "installation done (after ade patch + resume)."
            else
              echo "::error::Build failed for a reason other than the known ade <cstdint> issue."
              exit $BUILD_STATUS
            fi
          fi
          SCRIPT_EOF
          chmod +x inner_build.sh

      - name: Cross-compile OpenCV for ESP32 (docker run)
        run: |
          IDF_TARGET=esp32
          docker run --rm \
            -e IDF_TARGET="${IDF_TARGET}" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            "espressif/idf:${IDF_VER}" \
            bash -c "git config --global --add safe.directory '*' && . \${IDF_PATH}/export.sh && bash inner_build.sh"

      - name: Zip build output
        run: |
          cd esp32/lib
          zip -r "${GITHUB_WORKSPACE}/opencv-esp32-${IDF_VER}.zip" .

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: opencv-esp32-${{ env.IDF_VER }}
          name: "OpenCV for ESP32 (ESP-IDF ${{ env.IDF_VER }})"
          make_latest: false
          body: |
            Statically cross-compiled OpenCV (libopencv_core, libopencv_imgproc,
            libopencv_imgcodecs, libade, etc.) from nicklasb/esp32-opencv
            (upstream commit: ${{ steps.upstream.outputs.sha }})
            built with ESP-IDF toolchain `${{ env.IDF_VER }}`.
          files: opencv-esp32-*.zip
